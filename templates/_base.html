<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Solidário - Página Inicial</title>
    <meta name="description"
        content="Portal para dar transparência às necessidades de estoque de entidades beneficentes e aproximar doadores das demandas reais.">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='assets/favicon.ico') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@500,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='css/style.css') }}" rel="stylesheet" />
</head>

<body>
    <div class="page-shell">
        <header class="site-header">
            {% block navigation %}

            {% endblock %}
        </header>
        <main id="conteudo">
            {% block content %}

            {% endblock %}
        </main>
        <footer class="site-footer">
            <div
                class="container-app d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center">
                <p class="footer-copy">Estoque Solidário — interface inicial para transparência de estoques e apoio a
                    doadores.</p>
                <p class="footer-copy">Projeto integrador 2026</p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

</body>

</html>
